<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Budget &amp; Goal Setup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec5b",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102216",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom range slider styling */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #13ec5b;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(19, 236, 91, 0.4);
            margin-top: -8px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: #3b5443;
            border-radius: 4px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-10 bg-background-light dark:bg-background-dark/95 backdrop-blur-md px-4 pt-6 pb-4">
<div class="flex items-center justify-between mb-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 dark:bg-white/10">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="text-lg font-bold">Setup Your Plan</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
<!-- Progress Bar -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<span class="text-sm font-semibold text-primary">Personalization</span>
<span class="text-xs opacity-60">Step 1 of 3</span>
</div>
<div class="w-full h-1.5 bg-slate-200 dark:bg-white/10 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full w-1/3"></div>
</div>
</div>
</header>
<main class="flex-1 px-4 py-2 space-y-8 pb-32">
<!-- Introduction -->
<section>
<h2 class="text-3xl font-extrabold tracking-tight mb-2">Tailor Your Taste</h2>
<p class="text-slate-500 dark:text-slate-400">Set your budget and health goals to generate your custom weekly plan.</p>
</section>
<!-- Budget Selection -->
<section class="space-y-4">
<div class="flex justify-between items-center">
<h3 class="text-lg font-bold">Weekly Grocery Budget</h3>
<span class="text-2xl font-black text-primary">$120</span>
</div>
<div class="relative pt-2">
<input class="w-full h-2 bg-slate-200 dark:bg-white/10 rounded-lg appearance-none cursor-pointer accent-primary" max="400" min="40" type="range" value="120"/>
<div class="flex justify-between text-xs mt-3 opacity-50 font-medium">
<span>$40</span>
<span>$220</span>
<span>$400</span>
</div>
</div>
</section>
<!-- Diet Goals -->
<section class="space-y-4">
<h3 class="text-lg font-bold">What's your focus?</h3>
<div class="grid grid-cols-1 gap-3">
<!-- Goal Card 1 -->
<button class="flex items-center p-4 rounded-xl border-2 border-primary bg-primary/10 text-left transition-all">
<div class="w-12 h-12 rounded-lg bg-primary flex items-center justify-center mr-4 text-background-dark">
<span class="material-symbols-outlined font-bold">fitness_center</span>
</div>
<div class="flex-1">
<p class="font-bold">Muscle Gain</p>
<p class="text-xs opacity-70">High protein, calorie surplus</p>
</div>
<span class="material-symbols-outlined text-primary">check_circle</span>
</button>
<!-- Goal Card 2 -->
<button class="flex items-center p-4 rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-white/5 text-left hover:border-primary/50 transition-all">
<div class="w-12 h-12 rounded-lg bg-slate-100 dark:bg-white/10 flex items-center justify-center mr-4 text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined">monitor_weight</span>
</div>
<div class="flex-1">
<p class="font-bold">Weight Loss</p>
<p class="text-xs opacity-70">Calorie deficit, fiber-rich</p>
</div>
</button>
<!-- Goal Card 3 -->
<button class="flex items-center p-4 rounded-xl border border-slate-200 dark:border-white/10 bg-white dark:bg-white/5 text-left hover:border-primary/50 transition-all">
<div class="w-12 h-12 rounded-lg bg-slate-100 dark:bg-white/10 flex items-center justify-center mr-4 text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined">restaurant</span>
</div>
<div class="flex-1">
<p class="font-bold">Balanced Diet</p>
<p class="text-xs opacity-70">Maintained energy &amp; health</p>
</div>
</button>
</div>
</section>
<!-- Preferences / Allergies -->
<section class="space-y-4">
<h3 class="text-lg font-bold">Allergies &amp; Preferences</h3>
<div class="flex flex-wrap gap-2">
<span class="px-4 py-2 rounded-full bg-primary text-background-dark text-sm font-bold flex items-center gap-1">
                    Dairy-Free <span class="material-symbols-outlined text-sm">close</span>
</span>
<span class="px-4 py-2 rounded-full bg-slate-200 dark:bg-white/10 text-sm font-medium">Gluten-Free</span>
<span class="px-4 py-2 rounded-full bg-slate-200 dark:bg-white/10 text-sm font-medium">Nut-Free</span>
<span class="px-4 py-2 rounded-full bg-slate-200 dark:bg-white/10 text-sm font-medium">Vegan</span>
<span class="px-4 py-2 rounded-full bg-slate-200 dark:bg-white/10 text-sm font-medium">Keto</span>
<button class="px-3 py-2 rounded-full border border-dashed border-slate-400 dark:border-white/30 text-sm font-medium flex items-center gap-1">
<span class="material-symbols-outlined text-sm">add</span> Add Other
                </button>
</div>
</section>
</main>
<!-- Bottom Action Area -->
<footer class="fixed bottom-0 left-0 right-0 p-4 bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-white/5 pb-8">
<button class="w-full bg-primary text-background-dark font-extrabold py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-primary/20 active:scale-95 transition-transform">
            Start Planning
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
</footer>
</body></html>
